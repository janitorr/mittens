services:
  memory-server:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5070:5070"
    volumes:
      - memory-data:/app/data
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5070
      - ConnectionStrings__DefaultDb=Data Source=/app/data/memory.db
    restart: unless-stopped

volumes:
  memory-data:
