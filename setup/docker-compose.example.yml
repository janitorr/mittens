services:
  mittens:
    image: janitorr/mittens:latest
    container_name: mittens
    ports:
      - "5070:5070"
    volumes:
      - mittens-data:/app/data
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:5070
      - ConnectionStrings__DefaultDb=Data Source=/app/data/memory.db
    restart: unless-stopped

volumes:
  mittens-data:
